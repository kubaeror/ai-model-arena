services:
  # OpenTelemetry Collector — receives OTLP/HTTP on :4318, exports to Jaeger + Tempo.
  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.110.0
    container_name: arena-otel-collector
    command: ["--config=/etc/otelcol/config.yaml"]
    volumes:
      - ./observability/otel-collector/config.yaml:/etc/otelcol/config.yaml:ro
    ports:
      - "4318:4318"   # OTLP/HTTP (set OTEL_EXPORTER_OTLP_ENDPOINT=http://localhost:4318)
      - "4317:4317"   # OTLP/gRPC
    depends_on: [jaeger]

  # Jaeger all-in-one — stores + serves traces, UI on :16686.
  jaeger:
    image: jaegertracing/all-in-one:1.60
    container_name: arena-jaeger
    environment:
      COLLECTOR_OTLP_ENABLED: "true"
    ports:
      - "16686:16686"  # Jaeger UI
      - "4319:14250"   # gRPC (collector -> jaeger)

  # Grafana — datasource auto-provisioned (Jaeger), dashboard auto-loaded.
  grafana:
    image: grafana/grafana:11.2.0
    container_name: arena-grafana
    environment:
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: Admin
    volumes:
      - ./observability/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./observability/grafana/dashboards:/var/lib/grafana/dashboards:ro
    ports:
      - "3000:3000"    # Grafana UI
    depends_on: [jaeger]
