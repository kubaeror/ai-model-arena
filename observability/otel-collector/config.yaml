receivers:
  otlp:
    protocols:
      http:
        endpoint: 0.0.0.0:4318
      grpc:
        endpoint: 0.0.0.0:4317

processors:
  batch:
    timeout: 5s
    send_batch_size: 512

exporters:
  # Send traces to Jaeger over gRPC (Jaeger collector port 14250).
  otlp/jaeger:
    endpoint: jaeger:14250
    tls:
      insecure: true
  # Also expose OTLP for Grafana Tempo / other backends if desired.
  debug:
    verbosity: basic

service:
  pipelines:
    traces:
      receivers: [otlp]
      processors: [batch]
      exporters: [otlp/jaeger, debug]
