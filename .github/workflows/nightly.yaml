name: nightly
on:
  schedule:
    - cron: '0 2 * * *'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  full-e2e:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run typecheck
      - run: npm run lint
      - run: npm run test:coverage
      - run: npm ci --prefix src/dashboard-client
      - run: npm --prefix src/dashboard-client run test
      - run: npm run build
      - name: Stub agent-loop smoke
        run: node scripts/smoke-stub.mjs
      - name: Trace smoke test
        run: node scripts/trace-smoke-test.mjs
      - name: Build Docker image
        run: docker build -t ai-arena/runner:nightly .
      - name: Docker compose smoke
        run: |
          docker compose up -d
          for i in $(seq 1 60); do
            if curl -sf http://localhost:4000/health; then break; fi
            sleep 1
          done
          curl -sf http://localhost:4000/health
          docker compose down
