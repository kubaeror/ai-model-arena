name: nightly
on:
  schedule:
    - cron: '0 2 * * *'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  full-e2e:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run typecheck
      - run: npm run lint
      - run: npm run test:coverage
      - run: npm ci --prefix src/dashboard-client
      - run: npm --prefix src/dashboard-client run test
      - run: npm run build
      - name: Stub agent-loop smoke
        run: node scripts/smoke-stub.mjs
      - name: Trace smoke test
        run: node scripts/trace-smoke-test.mjs
      - name: Build Docker image
        run: docker build -t ai-arena/runner:nightly .
      - name: Docker compose smoke
        run: |
          docker compose up -d
          for i in $(seq 1 60); do
            if curl -sf http://localhost:4000/health; then break; fi
            sleep 1
          done
          curl -sf http://localhost:4000/health
          docker compose down
