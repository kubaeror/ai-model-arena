name: build-deploy
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run audit
      - run: npm run test:ci
      - run: npm run build
      - name: Build Docker image
        run: docker build -t ai-arena/runner:${{ github.sha }} .
      - name: Trivy vulnerability scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ai-arena/runner:${{ github.sha }}
          format: table
          exit-code: 1
          severity: HIGH,CRITICAL
      - name: Smoke test
        run: |
          docker compose up -d
          for i in $(seq 1 30); do
            if curl -sf http://localhost:4000/health; then break; fi
            sleep 1
          done
          curl -sf http://localhost:4000/health
          docker compose down
      - name: Build Docker image
        run: docker build -t ai-arena/runner:${{ github.sha }} .
      - name: Push Docker image
        if: github.ref == 'refs/heads/main'
        run: |
          echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin
          docker tag ai-arena/runner:${{ github.sha }} ai-arena/runner:latest
          docker push ai-arena/runner:${{ github.sha }}
          docker push ai-arena/runner:latest
