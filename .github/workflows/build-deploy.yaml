name: build-deploy
on:
  push:
    branches: [main]

permissions:
  contents: read
  packages: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run typecheck
      - run: npm run lint
      - run: npm run test:coverage
      - run: npm ci --prefix src/dashboard-client
      - run: npm --prefix src/dashboard-client run test
      - run: npm run build
      - name: Build Docker image
        run: docker build -t ai-arena/runner:${{ github.sha }} .
      - name: Generate SBOM
        run: npm ls --all --json --production 2>/dev/null > npm-sbom.json || true
      - name: Upload SBOM
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: sbom-${{ github.sha }}
          path: npm-sbom.json
          retention-days: 30
      - name: Trivy vulnerability scan
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          image-ref: ai-arena/runner:${{ github.sha }}
          format: table
          exit-code: 1
          severity: HIGH,CRITICAL
      - name: Smoke test
        run: |
          docker compose up -d
          for i in $(seq 1 60); do
            if curl -sf http://localhost:4000/health; then break; fi
            sleep 1
          done
          curl -sf http://localhost:4000/health
          docker compose down
      - name: Push Docker image
        run: |
          docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin <<< "${{ secrets.DOCKER_PASSWORD }}"
          docker tag ai-arena/runner:${{ github.sha }} ai-arena/runner:latest
          docker push ai-arena/runner:${{ github.sha }}
          docker push ai-arena/runner:latest
