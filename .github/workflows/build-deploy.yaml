name: build-deploy
on:
  push:
    branches: [main]

permissions:
  contents: read
  packages: write
  id-token: write  # needed for cosign keyless signing via OIDC

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run typecheck
      - run: npm run lint
      - run: npm run test:coverage
      - run: npm ci --prefix src/dashboard-client
      - run: npm --prefix src/dashboard-client run test
      - run: npm run build
      - name: Build Docker image
        run: docker build -t ai-arena/runner:${{ github.sha }} .
      - name: Generate SBOM
        run: npm ls --all --json --production 2>/dev/null > npm-sbom.json || true
      - name: Upload SBOM
        uses: actions/upload-artifact@330a01c490aca151604b8cf639adc76d48f6c5d4 # v5.0.0
        with:
          name: sbom-${{ github.sha }}
          path: npm-sbom.json
          retention-days: 30
      - name: Trivy vulnerability scan
        uses: aquasecurity/trivy-action@a9c7b0f06e461e9d4b4d1711f154ee024b8d7ab8 # v0.36.0
        with:
          image-ref: ai-arena/runner:${{ github.sha }}
          format: table
          exit-code: 1
          ignore-unfixed: true
          severity: HIGH,CRITICAL
      - name: Smoke test
        run: |
          docker compose up -d
          for i in $(seq 1 60); do
            if curl -sf http://localhost:4000/health; then break; fi
            sleep 1
          done
          curl -sf http://localhost:4000/health
          docker compose down
      - name: Push Docker image
        run: |
          docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin <<< "${{ secrets.DOCKER_PASSWORD }}"
          docker tag ai-arena/runner:${{ github.sha }} ai-arena/runner:latest
          docker push ai-arena/runner:${{ github.sha }}
          docker push ai-arena/runner:latest
      - name: Install Cosign
        uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2
      - name: Sign Docker image
        run: cosign sign --yes ai-arena/runner:${{ github.sha }}
        env:
          COSIGN_EXPERIMENTAL: "1"  # keyless signing via GitHub OIDC
