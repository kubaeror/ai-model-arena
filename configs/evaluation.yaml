# ai-model-arena evaluation configuration
# Settings for LLM-as-judge scoring and objective metrics

judge:
  # Name of the model to use as judge (from models.yaml)
  model: gpt-4o
  # Whether to run judge scoring (requires API call)
  enabled: true

rubric:
  # Code correctness (0-10): Does the code work?
  correctness:
    description: "Code correctness: Does the implementation work as specified? Are there bugs or edge cases?"
    maxScore: 10
  
  # Instruction fidelity (0-10): Did the model follow instructions?
  fidelity:
    description: "Instruction fidelity: Did the model follow the task instructions precisely?"
    maxScore: 10
  
  # Code quality/style (0-10): Clean, maintainable code
  style:
    description: "Code quality and style: Is the code clean, well-structured, and maintainable?"
    maxScore: 10
  
  # Efficiency (0-10): Optimal approach
  efficiency:
    description: "Efficiency of approach: Is the solution efficient and elegant?"
    maxScore: 10

regression:
  # Directory to store baseline snapshots
  baselineDir: outputs/baselines
  # Thresholds for regression detection
  thresholds:
    scoreDrop: 1.0
    tokenIncrease: 0.5
    timeIncrease: 0.5
  # Whether to fail CI on regression
  failOnRegression: true

rollback:
  # Whether to inject test failures for rollback tests
  enabled: false
  # Default prompt for injecting failure
  failPrompt: |
    A test is now failing. The test file and output are below:
    
    {test_output}
    
    Please fix the failing test.
