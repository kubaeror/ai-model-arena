# ai-model-arena schedule configuration
# Defines recurring jobs using cron expressions

schedules:
  - id: nightly-regression
    scenario: express-rest
    models:
      - gpt-4o
      - claude-3.7
    cron: "0 3 * * *"  # 3:00 AM daily
    enabled: true
    notifications:
      - slack-runs
    options:
      forceBudget: false
      timeoutMs: 1800000
  
