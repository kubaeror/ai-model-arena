# ──────────────────────────────────────────────────────────────
# ai-model-arena model registry
# Each entry maps a friendly "name" (used on the CLI and in output folders)
# to a provider + model id + tunables. API keys are NEVER stored here —
# `apiKeyEnv` names the environment variable that holds the key (see .env).
# ──────────────────────────────────────────────────────────────
models:
  # ── OpenAI ──────────────────────────────────────────────────
  - name: gpt-4o
    provider: openai
    model: gpt-4o
    apiKeyEnv: OPENAI_API_KEY
    maxTurns: 20
    temperature: 0.2
    maxTokens: 4096
    retry:
      maxRetries: 4
      initialDelayMs: 1000
      maxDelayMs: 30000

  # ── Anthropic ───────────────────────────────────────────────
  - name: claude-3.7
    provider: anthropic
    model: claude-3-7-sonnet-20250219
    apiKeyEnv: ANTHROPIC_API_KEY
    maxTurns: 20
    temperature: 0.2
    maxTokens: 4096
    retry:
      maxRetries: 4
      initialDelayMs: 1000
      maxDelayMs: 30000

  # ── Local (Ollama / LM Studio) via OpenAI-compatible API ────
  - name: ollama-llama3
    provider: ollama
    model: llama3.1
    baseUrl: http://localhost:11434/v1
    apiKeyEnv: OLLAMA_API_KEY
    maxTurns: 15
    temperature: 0.2
    maxTokens: 2048
    retry:
      maxRetries: 2
      initialDelayMs: 500
      maxDelayMs: 5000
