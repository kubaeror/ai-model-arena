services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: arena
      POSTGRES_PASSWORD: arena
      POSTGRES_DB: arena
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U arena"]
      interval: 2s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 2s
      timeout: 5s
      retries: 10

  runner:
    build: .
    environment:
      DB_DRIVER: postgres
      DATABASE_URL: postgres://arena:arena@postgres:5432/arena
      QUEUE_DRIVER: redis
      REDIS_URL: redis://redis:6379
      OUTPUT_ROOT: /var/arena/outputs
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - outputs:/var/arena/outputs
    command: ["node", "dist/runner.js"]

  dashboard:
    build: .
    environment:
      DB_DRIVER: postgres
      DATABASE_URL: postgres://arena:arena@postgres:5432/arena
      DASHBOARD_PORT: "4000"
      DASHBOARD_USERNAME: admin
      DASHBOARD_PASSWORD: change-me
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "4000:4000"
    command: ["node", "dist/dashboard-server/server.js"]
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:4000/health || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s

volumes:
  pgdata:
  redisdata:
  outputs:
