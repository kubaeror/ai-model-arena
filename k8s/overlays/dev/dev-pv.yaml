apiVersion: v1
kind: PersistentVolume
metadata:
  name: outputs-pv
  namespace: ai-arena
  labels:
    storage-tier: outputs
spec:
  accessModes: [ReadWriteMany]
  capacity:
    storage: 10Gi
  persistentVolumeReclaimPolicy: Retain
  hostPath:
    path: /tmp/arena-outputs
    type: DirectoryOrCreate
