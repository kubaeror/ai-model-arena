apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: ai-arena

resources:
  - ../../base

images:
  - name: ghcr.io/kubaeror/ai-model-arena-runner
    newTag: 01a4a83550f10722d064eca7e1872b927969b162

patches:
  - target:
      kind: Deployment
      name: dashboard
    patch: |-
      apiVersion: apps/v1
      kind: Deployment
      metadata:
        name: dashboard
      spec:
        template:
          spec:
            initContainers:
              - name: db-migrate
                imagePullPolicy: IfNotPresent
            containers:
              - name: dashboard
                imagePullPolicy: IfNotPresent
  - target:
      kind: Deployment
      labelSelector: app=runner
    patch: |-
      apiVersion: apps/v1
      kind: Deployment
      metadata:
        name: runner
      spec:
        template:
          spec:
            initContainers:
              - name: db-migrate
                imagePullPolicy: IfNotPresent
            containers:
              - name: runner
                imagePullPolicy: IfNotPresent
  - target:
      kind: CronJob
      name: arena-scheduler
    patch: |-
      apiVersion: batch/v1
      kind: CronJob
      metadata:
        name: arena-scheduler
      spec:
        jobTemplate:
          spec:
            template:
              spec:
                initContainers:
                  - name: db-migrate
                    imagePullPolicy: IfNotPresent
                containers:
                  - name: scheduler
                    imagePullPolicy: IfNotPresent
  - target:
      kind: PersistentVolumeClaim
      name: outputs
    patch: |-
      apiVersion: v1
      kind: PersistentVolumeClaim
      metadata:
        name: outputs
      spec:
        storageClassName: efs-sc
