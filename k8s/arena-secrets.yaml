apiVersion: v1
kind: Secret
metadata:
  name: postgres-auth
  namespace: ai-arena
  labels:
    app.kubernetes.io/part-of: ai-arena
type: Opaque
stringData:
  username: arena
  password: "${PG_PASSWORD}"
---
apiVersion: v1
kind: Secret
metadata:
  name: arena-db-auth
  namespace: ai-arena
  labels:
    app.kubernetes.io/part-of: ai-arena
type: Opaque
stringData:
  DATABASE_URL: "postgres://arena:${PG_PASSWORD}@postgres:5432/arena"
  REDIS_URL: "redis://:${REDIS_PASSWORD}@redis:6379/0"
  REDIS_PASSWORD: "${REDIS_PASSWORD}"
