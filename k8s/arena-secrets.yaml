apiVersion: v1
kind: Secret
metadata:
  name: postgres-auth
  namespace: ai-arena
type: Opaque
stringData:
  username: arena
  password: "${PG_PASSWORD:-arena}"
---
apiVersion: v1
kind: Secret
metadata:
  name: arena-db-auth
  namespace: ai-arena
type: Opaque
stringData:
  DATABASE_URL: "postgres://arena:${PG_PASSWORD:-arena}@postgres:5432/arena"
  REDIS_URL: "redis://:${REDIS_PASSWORD:-}@redis:6379/0"
  REDIS_PASSWORD: "${REDIS_PASSWORD:-}"
