apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: runner-anthropic-pdb
  namespace: ai-arena
spec:
  maxUnavailable: 1
  selector:
    matchLabels:
      app: runner
      provider: anthropic
