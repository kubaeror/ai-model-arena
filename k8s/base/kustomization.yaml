apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: ai-arena

labels:
  - pairs:
      app.kubernetes.io/part-of: ai-arena
      app.kubernetes.io/managed-by: argocd
    includeSelectors: false

images:
  - name: ghcr.io/kubaeror/ai-model-arena-runner
    newTag: PLACEHOLDER

resources:
  - namespace.yaml
  - namespace-quota.yaml
  - postgres.yaml
  - redis.yaml
  - output-pvc.yaml
  - runner-configmap.yaml
  - arena-secrets-sealed.yaml
  - dashboard-deployment.yaml
  - dashboard-service.yaml
  - dashboard-ingress.yaml
  - dashboard-rbac.yaml
  - runner-deployment.yaml
  - keda-scaledobject.yaml
  - keda-trigger-auth.yaml
  - scheduler-cronjob.yaml
  - network-policies.yaml
  - pdb.yaml
  - bedrock-runner-sa.yaml
  - runtimeclass-gvisor.yaml
