apiVersion: batch/v1
kind: CronJob
metadata:
  name: arena-scheduler
  namespace: ai-arena
spec:
  schedule: "*/1 * * * *"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      template:
        spec:
          restartPolicy: OnFailure
          securityContext:
            runAsNonRoot: true
            runAsUser: 10001
            fsGroup: 10001
            seccompProfile:
              type: RuntimeDefault
          initContainers:
            - name: db-migrate
              image: ghcr.io/kubaeror/ai-model-arena-runner:latest
              command: ["node", "dist/scripts/db-migrate.js"]
              envFrom:
                - configMapRef:
                    name: runner-config
                - secretRef:
                    name: arena-db-auth
              securityContext:
                readOnlyRootFilesystem: false
                allowPrivilegeEscalation: false
                capabilities:
                  drop: [ALL]
          containers:
            - name: scheduler
              image: ghcr.io/kubaeror/ai-model-arena-runner:latest
              command: ["node", "dist/scripts/scheduler-tick.js"]
              securityContext:
                allowPrivilegeEscalation: false
                capabilities:
                  drop:
                    - ALL
                readOnlyRootFilesystem: true
              envFrom:
                - configMapRef:
                    name: runner-config
                - secretRef:
                    name: arena-db-auth
              resources:
                requests:
                  cpu: 50m
                  memory: 64Mi
                limits:
                  cpu: 200m
                  memory: 128Mi
