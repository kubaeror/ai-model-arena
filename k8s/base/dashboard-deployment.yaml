apiVersion: apps/v1
kind: Deployment
metadata:
  name: dashboard
  namespace: ai-arena
spec:
  replicas: 1
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: dashboard
  template:
    metadata:
      labels:
        app: dashboard
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "4000"
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 10001
        fsGroup: 10001
        seccompProfile:
          type: RuntimeDefault
      initContainers:
        - name: db-migrate
          image: ghcr.io/kubaeror/ai-model-arena-runner:latest
          command: ["node", "dist/scripts/db-migrate.js"]
          envFrom:
            - configMapRef:
                name: runner-config
            - secretRef:
                name: arena-db-auth
          securityContext:
            readOnlyRootFilesystem: false
            allowPrivilegeEscalation: false
            capabilities:
              drop: [ALL]
      containers:
        - name: dashboard
          image: ghcr.io/kubaeror/ai-model-arena-runner:latest
          command: ["node", "dist/dashboard-server/server.js"]
          envFrom:
            - configMapRef:
                name: runner-config
            - secretRef:
                name: arena-db-auth
            - secretRef:
                name: provider-keys
          env:
            - name: DASHBOARD_PORT
              value: "4000"
            - name: DASHBOARD_USERNAME
              value: admin
            - name: DASHBOARD_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: dashboard-auth
                  key: password
            - name: DASHBOARD_JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: dashboard-auth
                  key: jwt-secret
          ports:
            - containerPort: 4000
          volumeMounts:
            - name: outputs
              mountPath: /var/arena/outputs
          securityContext:
            readOnlyRootFilesystem: true
            allowPrivilegeEscalation: false
            capabilities:
              drop: [ALL]
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
          startupProbe:
            httpGet:
              path: /health
              port: 4000
            failureThreshold: 30
            periodSeconds: 2
          livenessProbe:
            httpGet:
              path: /health
              port: 4000
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /health
              port: 4000
            initialDelaySeconds: 5
            periodSeconds: 5
      volumes:
        - name: outputs
          persistentVolumeClaim:
            claimName: outputs
