# Sealed Secrets — Production secret management for ai-model-arena
#
# INSTALL:
#   kubectl apply -f https://github.com/bitnami-labs/sealed-secrets/releases/latest/download/controller.yaml
#
# USAGE:
#   1. Create a plain secret file (do NOT commit to git):
#      kubectl create secret generic arena-secrets \
#        --namespace ai-arena \
#        --from-literal=PG_PASSWORD=<password> \
#        --from-literal=DATABASE_URL=postgresql://arena:<password>@postgres.ai-arena:5432/arena \
#        --from-literal=REDIS_URL=redis://:${REDIS_PASSWORD}@redis.ai-arena:6379 \
#        --from-literal=DASHBOARD_JWT_SECRET=<secret> \
#        --dry-run=client -o yaml > arena-secrets-plain.yaml
#
#   2. Seal it:
#      kubeseal < arena-secrets-plain.yaml > arena-secrets-sealed.yaml
#
#   3. Commit ONLY the sealed file:
#      git add k8s/arena-secrets-sealed.yaml
#
#   4. The Sealed Secrets controller will decrypt and create the Secret resource.
#
# ALTERNATIVE: External Secrets Operator (ESO) with AWS Secrets Manager / GCP Secret Manager
#   See: https://external-secrets.io/latest/

---
apiVersion: v1
kind: Secret
metadata:
  name: arena-db-auth
  namespace: ai-arena
  annotations:
    # Encrypted by Sealed Secrets — this file is safe to commit to git.
    sealedsecrets.bitnami.com/managed: "true"
type: Opaque
stringData:
  DATABASE_URL: "PLACEHOLDER"       # Replace via kubeseal
  REDIS_URL: "PLACEHOLDER"          # Replace via kubeseal
  REDIS_PASSWORD: "PLACEHOLDER"     # Replace via kubeseal
  DASHBOARD_JWT_SECRET: "PLACEHOLDER"  # Replace via kubeseal
---
apiVersion: v1
kind: Secret
metadata:
  name: postgres-auth
  namespace: ai-arena
  annotations:
    sealedsecrets.bitnami.com/managed: "true"
type: Opaque
stringData:
  username: "arena"
  password: "PLACEHOLDER"  # Replace via kubeseal
---
apiVersion: v1
kind: Secret
metadata:
  name: provider-keys
  namespace: ai-arena
  annotations:
    sealedsecrets.bitnami.com/managed: "true"
type: Opaque
stringData:
  OPENAI_API_KEY: "PLACEHOLDER"      # Replace via kubeseal
  ANTHROPIC_API_KEY: "PLACEHOLDER"   # Replace via kubeseal
  GOOGLE_API_KEY: "PLACEHOLDER"      # Replace via kubeseal
  OPENROUTER_API_KEY: "PLACEHOLDER"  # Replace via kubeseal
  GROQ_API_KEY: "PLACEHOLDER"        # Replace via kubeseal
  CEREBRAS_API_KEY: "PLACEHOLDER"    # Replace via kubeseal
  NVIDIA_API_KEY: "PLACEHOLDER"      # Replace via kubeseal
  MISTRAL_API_KEY: "PLACEHOLDER"     # Replace via kubeseal
  SAMBANOVA_API_KEY: "PLACEHOLDER"   # Replace via kubeseal
  SCALEWAY_API_KEY: "PLACEHOLDER"    # Replace via kubeseal
  CLOUDFLARE_API_TOKEN: "PLACEHOLDER" # Replace via kubeseal
  GITHUB_TOKEN: "PLACEHOLDER"        # Replace via kubeseal
  XAI_API_KEY: "PLACEHOLDER"         # Replace via kubeseal

# Steps to seal these secrets for production:
# 1. Install kubeseal: https://github.com/bitnami-labs/sealed-secrets#installation
# 2. Create a plain YAML with real values (do NOT commit):
#      cp k8s/arena-secrets-sealed.yaml /tmp/arena-secrets-plain.yaml
#      # Edit /tmp/arena-secrets-plain.yaml to add real values
# 3. Seal it:
#      kubeseal --namespace ai-arena < /tmp/arena-secrets-plain.yaml > k8s/arena-secrets-sealed.yaml
# 4. Commit and deploy:
#      kubectl apply -f k8s/arena-secrets-sealed.yaml
---
