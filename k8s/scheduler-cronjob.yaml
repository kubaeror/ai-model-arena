apiVersion: batch/v1
kind: CronJob
metadata:
  name: arena-scheduler
  namespace: ai-arena
spec:
  schedule: "*/1 * * * *"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      template:
        spec:
          restartPolicy: OnFailure
          containers:
            - name: scheduler
              image: ai-arena/runner:latest
              command: ["node", "scripts/scheduler-tick.js"]
              envFrom:
                - configMapRef:
                    name: runner-config
                - secretRef:
                    name: arena-db-auth
                - secretRef:
                    name: provider-keys
              resources:
                requests:
                  cpu: 50m
                  memory: 64Mi
                limits:
                  cpu: 200m
                  memory: 128Mi
