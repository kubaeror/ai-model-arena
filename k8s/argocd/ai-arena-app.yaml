apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: ai-arena
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/kubaeror/ai-model-arena
    targetRevision: main
    path: k8s/overlays/prod
  destination:
    server: https://kubernetes.default.svc
    namespace: ai-arena
  syncPolicy:
    automated:
      prune: false
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
