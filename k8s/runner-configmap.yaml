apiVersion: v1
kind: ConfigMap
metadata:
  name: runner-config
  namespace: ai-arena
data:
  DB_DRIVER: postgres
  DATABASE_URL: postgres://arena:arena@postgres:5432/arena
  REDIS_URL: redis://redis:6379
  QUEUE_DRIVER: redis
  OUTPUT_ROOT: /var/arena/outputs
  REDIS_STREAM_PREFIX: arena:tasks
  REDIS_CONSUMER_GROUP: arena-runners
  MAX_TASK_ATTEMPTS: "5"
  LOG_LEVEL: info
