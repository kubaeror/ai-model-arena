apiVersion: v1
kind: ServiceAccount
metadata:
  name: dashboard
  namespace: ai-arena
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: dashboard
  namespace: ai-arena
rules:
  - apiGroups: [""]
    resources: [pods, pods/log]
    verbs: [get, list, watch]
  - apiGroups: [apps]
    resources: [deployments]
    verbs: [get, list, patch]
  - apiGroups: [keda.sh]
    resources: [scaledobjects]
    verbs: [get, list, patch]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: dashboard
  namespace: ai-arena
roleRef:
  kind: Role
  name: dashboard
  apiGroup: rbac.authorization.k8s.io
subjects:
  - kind: ServiceAccount
    name: dashboard
    namespace: ai-arena
